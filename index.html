<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MagicLami V5 Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; user-select: none; }
        body { background-color: #000; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app-container { width: 100%; max-width: 480px; background-color: #0f4c3a; color: white; display: flex; flex-direction: column; height: 100%; position: relative; }
        
        /* 顶部桌面 */
        #table-area { flex: 1; padding: 10px; overflow-y: auto; background: rgba(0, 0, 0, 0.2); border-bottom: 2px solid #0a3528; }
        .meld-group { background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 8px; margin-bottom: 8px; display: flex; flex-wrap: wrap; border: 2px solid transparent; min-height: 50px; position: relative; }
        .meld-group.active-target { border-color: #ffeb3b; background: rgba(255, 235, 59, 0.15); }
        
        /* 牌样式 */
        .card { background: white; border-radius: 4px; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 36px; height: 50px; font-weight: bold; font-size: 1.1rem; box-shadow: 1px 2px 3px rgba(0,0,0,0.4); margin: 2px; border: 1px solid #ccc; color: #212121; }
        .card.red { color: #d32f2f; }
        .card.joker { color: #fbc02d; font-size: 0.8rem; border: 2px solid #fbc02d; }

        /* AI 提示区：点击可直接出牌 */
        #ai-hint-bar { padding: 8px 10px; background: #1a1a1a; border-bottom: 2px solid #000; display: flex; flex-direction: column; max-height: 120px; overflow-y: auto; }
        .ai-hint-item { font-size: 0.95rem; font-weight: bold; padding: 8px; margin-bottom: 4px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid #333; }
        .ai-hint-item:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }

        /* 操作控制中枢 */
        #player-area { height: 52vh; display: flex; flex-direction: column; background: #0a3528; padding: 10px; }
        #hand-display { flex: 1; overflow-y: auto; margin-bottom: 8px; border-radius: 6px; background: rgba(0,0,0,0.3); padding: 6px; display: flex; flex-wrap: wrap; align-content: flex-start; border: 2px solid transparent; }
        #hand-display.active-target { border-color: #4caf50; }

        /* 模式切换开关 */
        #mode-toggle { display: flex; background: #222; border-radius: 8px; margin-bottom: 8px; padding: 2px; }
        .mode-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; color: #666; font-weight: bold; background: none; }
        .mode-btn.active { background: #444; color: #ffeb3b; }
        .mode-btn.broken { background: #4caf50; color: white; }

        #target-controls { display: flex; gap: 8px; margin-bottom: 8px; }
        .control-btn { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: bold; background: #333; color: white; box-shadow: 0 4px 0 #111; }
        .control-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #111; }
        .control-btn.active { background: #4caf50; box-shadow: 0 4px 0 #2e7d32; }

        /* 键盘 */
        .suits { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
        .ranks { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .btn { background: #e0e0e0; border: none; border-radius: 4px; font-weight: bold; padding: 10px 0; color: #333; box-shadow: 0 3px 0 #999; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #999; }
        .btn-red { color: #d32f2f; }
        .btn-joker { background: #fbc02d; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="table-area">
        <div class="section-title" style="font-size: 0.8rem; color: #a5d6a7; margin-bottom: 5px;">
            <span>桌面 (点牌删除/点组接牌)</span>
            <span id="game-phase" style="color: #ff9800;">[🧊 等待破冰]</span>
        </div>
        <div id="table-content"></div>
    </div>

    <div id="ai-hint-bar"></div>

    <div id="player-area">
        <div id="mode-toggle">
            <button class="mode-btn active" id="btn-phase-ice" onclick="setPhase('ice')">🧊 破冰阶段</button>
            <button class="mode-btn" id="btn-phase-free" onclick="setPhase('free')">🔥 自由出牌</button>
        </div>

        <div id="hand-display" class="active-target" onclick="setFocus('hand')"></div>

        <div id="target-controls">
            <button class="control-btn active" id="ctrl-hand" onclick="setFocus('hand')">🖐️ 录入手牌</button>
            <button class="control-btn" id="ctrl-table" onclick="addNewTableGroup()">➕ 记对手牌</button>
        </div>

        <div id="input-keyboard">
            <div class="suits">
                <button class="btn" onclick="setSuit('♠️','black')">♠️</button>
                <button class="btn btn-red" onclick="setSuit('♥️','red')">♥️</button>
                <button class="btn" onclick="setSuit('♣️','black')">♣️</button>
                <button class="btn btn-red" onclick="setSuit('♦️','red')">♦️</button>
            </div>
            <div class="ranks">
                <button class="btn" onclick="pressKey('A')">A</button>
                <button class="btn" onclick="pressKey('2')">2</button>
                <button class="btn" onclick="pressKey('3')">3</button>
                <button class="btn" onclick="pressKey('4')">4</button>
                <button class="btn" onclick="pressKey('5')">5</button>
                <button class="btn" onclick="pressKey('6')">6</button>
                <button class="btn" onclick="pressKey('7')">7</button>
                <button class="btn" onclick="pressKey('8')">8</button>
                <button class="btn" onclick="pressKey('9')">9</button>
                <button class="btn" onclick="pressKey('10')">10</button>
                <button class="btn" onclick="pressKey('J')">J</button>
                <button class="btn" onclick="pressKey('Q')">Q</button>
                <button class="btn" onclick="pressKey('K')">K</button>
                <button class="btn btn-joker" onclick="pressKey('Joker')">🤡</button>
            </div>
        </div>
    </div>
</div>

<script>
    let myHand = [], tableGroups = [], focus = 'hand', phase = 'ice';
    let curSuit = '♠️', curColor = 'black';
    const rankMap = { 'A':1, 'J':11, 'Q':12, 'K':13, 'Joker':99 };
    const suitOrder = { '♠️':1, '♥️':2, '♣️':3, '♦️':4, '🤡':5 };

    // --- 核心逻辑 ---
    function setPhase(p) {
        phase = p;
        document.getElementById('game-phase').innerText = p === 'ice' ? '[🧊 等待破冰]' : '[🔥 自由出牌]';
        document.getElementById('btn-phase-ice').classList.toggle('active', p === 'ice');
        document.getElementById('btn-phase-free').classList.toggle('active', p === 'free');
        if(p === 'free') document.getElementById('btn-phase-free').classList.add('broken');
        calculate();
    }

    function setFocus(f) {
        focus = f;
        document.getElementById('ctrl-hand').classList.toggle('active', f === 'hand');
        document.getElementById('ctrl-table').classList.toggle('active', f !== 'hand');
        render();
    }

    function addNewTableGroup() {
        tableGroups.push([]);
        setFocus(tableGroups.length - 1);
    }

    function pressKey(rank) {
        const card = rank === 'Joker' ? { suit:'🤡', rank:'Joker', color:'joker' } : { suit:curSuit, rank, color:curColor };
        if (focus === 'hand') myHand.push(card);
        else {
            tableGroups[focus].push(card);
            tableGroups[focus] = smartSort(tableGroups[focus]);
        }
        calculate(); render();
    }

    function smartSort(group) {
        let rs = group.filter(c => c.rank !== 'Joker').sort((a, b) => (rankMap[a.rank]||a.rank) - (rankMap[b.rank]||b.rank));
        let js = group.filter(c => c.rank === 'Joker');
        if (rs.length > 1 && rs.every(c => c.suit === rs[0].suit)) {
            let res = [], cur = rankMap[rs[0].rank] || parseInt(rs[0].rank);
            rs.forEach(c => {
                while ((rankMap[c.rank]||parseInt(c.rank)) > cur && js.length > 0) { res.push(js.pop()); cur++; }
                res.push(c); cur++;
            });
            return [...res, ...js];
        }
        return [...rs, ...js];
    }

    // --- 一键出牌：点击 AI 建议直接执行 ---
    function autoPlay(type, data) {
        if (type === 'ice') {
            data.forEach(cardStr => {
                let idx = myHand.findIndex(c => (c.rank === 'Joker' && cardStr === '🤡') || (c.rank === cardStr && c.suit === data.suit));
                if (idx > -1) tableGroups.push(myHand.splice(idx, 1));
            });
            tableGroups[tableGroups.length-1] = smartSort(tableGroups[tableGroups.length-1]);
            setPhase('free');
        } else if (type === 'append') {
            let idx = myHand.findIndex(c => c.rank === data.rank && c.suit === data.suit);
            if (idx > -1) tableGroups[data.gIdx].push(myHand.splice(idx, 1)[0]);
            tableGroups[data.gIdx] = smartSort(tableGroups[data.gIdx]);
        }
        calculate(); render();
    }

    // --- AI 大脑 ---
    function calculate() {
        const bar = document.getElementById('ai-hint-bar');
        bar.innerHTML = "";
        
        if (phase === 'ice') {
            // 简化版破冰搜索
            let suits = ['♠️','♥️','♣️','♦️'];
            suits.forEach(s => {
                let cards = myHand.filter(c => c.suit === s).map(c => rankMap[c.rank] || parseInt(c.rank)).sort((a,b)=>a-b);
                for(let i=0; i<cards.length-2; i++) {
                    if(cards[i+1] === cards[i]+1 && cards[i+2] === cards[i]+2) {
                        let res = [numToRank(cards[i]), numToRank(cards[i+1]), numToRank(cards[i+2])];
                        let item = document.createElement('div');
                        item.className = 'ai-hint-item';
                        item.style.color = '#4caf50';
                        item.innerHTML = `🟢 破冰首选 (点击执行): ${s} [${res.join(',')}]`;
                        item.onclick = () => autoPlay('ice', res.map(r => ({suit:s, rank:r})));
                        bar.appendChild(item);
                    }
                }
            });
        } else {
            // 自由接牌搜索
            tableGroups.forEach((g, gIdx) => {
                if (g.length < 3) return;
                let rs = g.filter(c => c.rank !== 'Joker');
                myHand.forEach(h => {
                    if (h.suit === rs[0].suit && (rankMap[h.rank] || parseInt(h.rank)) === (rankMap[g[g.length-1].rank] || parseInt(g[g.length-1].rank)) + 1) {
                        let item = document.createElement('div');
                        item.className = 'ai-hint-item';
                        item.style.color = '#ffeb3b';
                        item.innerHTML = `🟡 接牌 (点击执行): [${h.suit}${h.rank}] 接到第 ${gIdx+1} 组后`;
                        item.onclick = () => autoPlay('append', {suit:h.suit, rank:h.rank, gIdx});
                        bar.appendChild(item);
                    }
                });
            });
        }
        if (!bar.innerHTML) bar.innerHTML = '<div style="color:#666; font-size:0.8rem;">等待计算结果...</div>';
    }

    function numToRank(n) { return {1:'A', 11:'J', 12:'Q', 13:'K'}[n] || n.toString(); }
    function setSuit(s, c) { curSuit = s; curColor = c; }

    function render() {
        myHand.sort((a, b) => suitOrder[a.suit] !== suitOrder[b.suit] ? suitOrder[a.suit] - suitOrder[b.suit] : (rankMap[a.rank]||parseInt(a.rank)) - (rankMap[b.rank]||parseInt(b.rank)));
        document.getElementById('hand-display').innerHTML = myHand.map((c, i) => `<div class="card ${c.color}" onclick="myHand.splice(${i},1);calculate();render();event.stopPropagation();"><div>${c.suit}</div><div>${c.rank}</div></div>`).join('');
        document.getElementById('table-content').innerHTML = tableGroups.map((g, i) => `
            <div class="meld-group ${focus === i ? 'active-target' : ''}" onclick="setFocus(${i})">
                ${g.map((c, ci) => `<div class="card ${c.color}" onclick="tableGroups[${i}].splice(${ci},1);render();event.stopPropagation();"><div>${c.suit}</div><div>${c.rank}</div></div>`).join('')}
            </div>`).join('');
        document.getElementById('hand-display').classList.toggle('active-target', focus === 'hand');
    }
</script>
</body>
</html>
